services:
  db:
    image: postgres:15-alpine
    container_name: todo_api_db
    restart: always
    environment:
      POSTGRES_USER: todo_app_user
      POSTGRES_PASSWORD: todo_app_password
      POSTGRES_DB: todo_db
    ports:
      - '5433:5432'
    volumes:
      - todo_db_data:/var/lib/postgresql/data

volumes:
  todo_db_data:
